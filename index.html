<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2E1065" />
    <meta name="description" content="GigShield — Parametric zero-touch insurance for Zomato & Swiggy delivery partners. Instant payouts for rain, AQI, and platform outages." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GigShield" />

    <!-- Open Graph -->
    <meta property="og:title" content="GigShield – Gig Worker Insurance" />
    <meta property="og:description" content="Parametric zero-touch insurance for Zomato & Swiggy delivery partners." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />

    <title>GigShield – Gig Worker Insurance</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register Service Worker for PWA support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then((reg) => console.log('[GigShield] SW registered:', reg.scope))
            .catch((err) => console.error('[GigShield] SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
